      <nav class="navbar">

        <ul>
          <li><a href="index.html">home</a></li>
          <li><a href="about.html">about</a></li>

          <li><a href="testimonials.html">Location</a></li>
          <li><a href="contact.html">contact</a></li>
        </ul>
      </nav>

    <!--Header end-->

    <!--main start-->
    <main>
      <!--contact section start-->
      <section id="contact-section">
        <div class="container">
          <h1 class="contact-title">Get In Touch</h1>

          <div class="contact-content">
            <div class="contact-info">
              <h2>Contact Information</h2>

              <div class="info-item">
                
              </div>

              <div class="info-item">
                <i class="fas fa-phone"></i>
                <div>
                  <h3>Phone</h3>
                  <p>(+20) 123-456-7890<br />(+20) 123-456-7891</p>
                </div>
              </div>

              <div class="info-item">
                <i class="fas fa-envelope"></i>
                <div>
                  <h3>Email</h3>
                  <p>info@stgeorgebakery.com<br />orders@stgeorgebakery.com</p>
                </div>
              </div>

              <div class="info-item">
                <i class="fas fa-clock"></i>
                <div>
                  <h3>Business Hours</h3>
                  <p>
                    Monday - Friday: 6:00 AM - 10:00 PM<br />Saturday - Sunday:
                    7:00 AM - 11:00 PM
                  </p>
                </div>
              </div>

              <div class="social-links">
                <h3>Follow Us</h3>
                <div class="socials">
                  <a href="https://www.facebook.com/profile.php?id=100068472963342" class="social-icon"
                    ><i class="fab fa-facebook"></i
                  ></a>
                  <a href="#" class="social-icon"
                    ><i class="fab fa-instagram"></i
                  ></a>
                 
                  <a href="#" class="social-icon"
                    ><i class="fab fa-whatsapp"></i
                  ></a>
                </div>
              </div>
            </div>

            
          </div>
        </div>
      </section>
      <!--contact section end-->

    <!--main end-->
